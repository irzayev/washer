version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: washer-postgres
    environment:
      POSTGRES_USER: washer
      POSTGRES_PASSWORD: washer
      POSTGRES_DB: washer
      TZ: Asia/Baku
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U washer -d washer']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: washer-redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: washer-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: washer-evolution
    environment:
      AUTHENTICATION_API_KEY: change-me
      DATABASE_ENABLED: 'false'
      LANGUAGE: en
    ports:
      - '8080:8080'
    volumes:
      - evolution_data:/evolution/instances
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: washer-ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  evolution_data:
  ollama_data:
