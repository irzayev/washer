name: washer

services:
  postgres:
    image: postgres:16-alpine
    container_name: washer-postgres
    environment:
      POSTGRES_USER: washer
      POSTGRES_PASSWORD: washer
      POSTGRES_DB: washer
      TZ: Asia/Baku
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U washer -d washer']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: washer-redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: washer-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: washer-api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://washer:washer@postgres:5432/washer?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
      EVOLUTION_API_URL: http://evolution-api:8080
      OLLAMA_BASE_URL: http://ollama:11434
      API_HOST: 0.0.0.0
      API_PORT: 4000
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    container_name: washer-worker
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://washer:washer@postgres:5432/washer?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: washer-web
    environment:
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      - api
    restart: unless-stopped

  client-portal:
    build:
      context: ..
      dockerfile: docker/client-portal.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: washer-client-portal
    environment:
      NODE_ENV: production
    ports:
      - '3001:3001'
    depends_on:
      - api
    restart: unless-stopped

  evolution-api:
    profiles: ['extras']
    image: atendai/evolution-api:latest
    container_name: washer-evolution
    environment:
      AUTHENTICATION_API_KEY: change-me
      DATABASE_ENABLED: 'false'
      LANGUAGE: en
    ports:
      - '8080:8080'
    volumes:
      - evolution_data:/evolution/instances
    restart: unless-stopped

  ollama:
    profiles: ['extras']
    image: ollama/ollama:latest
    container_name: washer-ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  evolution_data:
  ollama_data:
