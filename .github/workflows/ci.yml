name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: washer
          POSTGRES_PASSWORD: washer
          POSTGRES_DB: washer
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U washer" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://washer:washer@localhost:5432/washer?schema=public
      JWT_ACCESS_SECRET: testaccesssecret_minimum_32_characters_long_yes
      JWT_REFRESH_SECRET: testrefreshsecret_minimum_32_characters_long_yes
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm db:generate
      - run: pnpm typecheck
      - run: pnpm --filter @washer/api test
      - run: pnpm build
